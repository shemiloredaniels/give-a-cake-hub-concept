<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Give a Cake — State Page</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .state-hero { padding: 3rem 2rem 2rem; background: var(--warm-white); border-bottom: 1px solid var(--border); }
    .state-hero-inner { max-width: 1100px; margin: 0 auto; }
    .back-link { font-size: 13px; color: var(--caramel); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 1.5rem; }
    .back-link:hover { text-decoration: underline; }
    .state-hero-title { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3.5rem); color: var(--ink); margin-bottom: 0.5rem; }
    .zip-row { display: flex; gap: 10px; margin-top: 1.5rem; max-width: 420px; }
    .zip-row input { flex: 1; padding: 11px 14px; border: 1px solid var(--border-strong); border-radius: 8px; font-size: 15px; font-family: var(--font-body); background: white; color: var(--ink); }
    .zip-row input:focus { outline: 2px solid var(--caramel); border-color: transparent; }
    .zip-row button { background: var(--caramel); color: white; border: none; padding: 11px 20px; border-radius: 8px; font-size: 15px; font-family: var(--font-body); font-weight: 500; cursor: pointer; }
    .state-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin: 2rem auto; max-width: 1100px; padding: 0 2rem; }
    .stat-pill { background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem 1.25rem; }
    .stat-pill-num { font-family: var(--font-display); font-size: 1.8rem; color: var(--ink); }
    .stat-pill-label { font-size: 12px; color: var(--ink-light); margin-top: 2px; }
    .state-tabs { max-width: 1100px; margin: 0 auto; padding: 0 2rem; display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 0; }
    .state-tab { padding: 14px 20px; font-size: 14px; color: var(--ink-mid); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; background: transparent; border-top: none; border-left: none; border-right: none; font-family: var(--font-body); }
    .state-tab.active { color: var(--caramel); border-bottom-color: var(--caramel); font-weight: 500; }
    .state-content { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="../index.html">
    <div class="nav-logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18 11h-1.5V9.5a.5.5 0 0 0-1 0V11H14a.5.5 0 0 0 0 1h1.5v1.5a.5.5 0 0 0 1 0V12H18a.5.5 0 0 0 0-1ZM12 2a5 5 0 0 0-5 5H4a1 1 0 0 0-1 1v2a3 3 0 0 0 3 3v6a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-6a3 3 0 0 0 1.83-2.73A5 5 0 0 0 12 2Z"/></svg>
    </div>
    <span class="nav-logo-text">Give a Cake</span>
  </a>
  <div class="nav-links">
    <a href="../index.html#bakers">Find bakers</a>
    <a href="../index.html#nonprofits">Nonprofits</a>
    <a href="../index.html#calendar">Sign up</a>
    <a href="../admin.html" class="nav-cta">Admin</a>
  </div>
</nav>

<div class="state-hero">
  <div class="state-hero-inner">
    <a class="back-link" href="../index.html">← All states</a>
    <p class="section-label" id="state-eyebrow">Loading…</p>
    <h1 class="state-hero-title" id="state-title">Loading…</h1>
    <p style="color:var(--ink-mid);font-size:15px;max-width:480px;margin-top:0.5rem;">Enter your zip code to narrow results to your neighborhood.</p>
    <div class="zip-row">
      <input type="text" id="zip-input" placeholder="Enter your zip code…" maxlength="5" />
      <button onclick="filterByZip()">Search</button>
    </div>
  </div>
</div>

<div class="state-stats">
  <div class="stat-pill"><div class="stat-pill-num" id="stat-bakers">–</div><div class="stat-pill-label">Baker volunteers</div></div>
  <div class="stat-pill"><div class="stat-pill-num" id="stat-npos">–</div><div class="stat-pill-label">Nonprofit partners</div></div>
  <div class="stat-pill"><div class="stat-pill-num" id="stat-slots">–</div><div class="stat-pill-label">Open slots this month</div></div>
  <div class="stat-pill"><div class="stat-pill-num" id="stat-donated">–</div><div class="stat-pill-label">Items donated this year</div></div>
</div>

<div class="state-tabs">
  <button class="state-tab active" onclick="showTab('bakers')">Baker volunteers</button>
  <button class="state-tab" onclick="showTab('nonprofits')">Nonprofit partners</button>
  <button class="state-tab" onclick="showTab('calendar')">Sign-up calendar</button>
</div>

<div class="state-content">
  <div class="tab-panel active" id="tab-bakers">
    <div class="baker-grid" id="state-baker-grid"></div>
  </div>
  <div class="tab-panel" id="tab-nonprofits">
    <div class="npo-grid" id="state-npo-grid"></div>
  </div>
  <div class="tab-panel" id="tab-calendar">
    <div class="month-tabs" style="margin-bottom:1.5rem;">
      <button class="month-tab active" data-month="july" onclick="renderCalendar('july')">July 2026</button>
      <button class="month-tab" data-month="august" onclick="renderCalendar('august')">August 2026</button>
      <button class="month-tab" data-month="september" onclick="renderCalendar('september')">September 2026</button>
    </div>
    <div class="slots-grid" id="slots-grid"></div>
  </div>
</div>

<!-- MODAL: Claim slot -->
<div class="modal-overlay" id="slot-modal">
  <div class="modal">
    <h2 id="modal-slot-title">Claim a slot</h2>
    <p style="font-size:13px;color:var(--ink-light)" id="modal-slot-org"></p>
    <label>Your name</label>
    <input type="text" id="slot-name" placeholder="Full name" />
    <label>Email address</label>
    <input type="email" id="slot-email" placeholder="you@example.com" />
    <label>What will you bake? (optional)</label>
    <input type="text" id="slot-item" placeholder="e.g. Banana bread, brownies…" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSlotModal()">Cancel</button>
      <button class="btn-submit" onclick="submitSlot()">Claim slot</button>
    </div>
  </div>
</div>

<!-- MODAL: Sign up for nonprofit -->
<div class="modal-overlay" id="signup-modal">
  <div class="modal">
    <h2>Sign up to donate</h2>
    <p style="font-size:13px;color:var(--ink-light)" id="signup-npo-name"></p>
    <label>Your name</label>
    <input type="text" id="signup-name" placeholder="Full name" />
    <label>Email address</label>
    <input type="email" id="signup-email" placeholder="you@example.com" />
    <label>Preferred donation date</label>
    <input type="date" id="signup-date" />
    <label>What do you plan to bring?</label>
    <input type="text" id="signup-item" placeholder="e.g. 2 dozen cookies" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSignUpModal()">Cancel</button>
      <button class="btn-submit" onclick="submitSignUp()">Send request</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../js/main.js"></script>
<script>
  // Override render targets to state page grids
  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('state') || 'FL';
    const state = data.states.find(s => s.code === code) || { code, name: code, vols: 14 };

    document.getElementById('state-eyebrow').textContent = state.code + ' · ' + state.vols + ' bakers';
    document.getElementById('state-title').textContent = state.name;
    document.title = `Give a Cake — ${state.name}`;

    // stats
    document.getElementById('stat-bakers').textContent = state.vols;
    document.getElementById('stat-npos').textContent = Math.floor(state.vols * 0.4);
    document.getElementById('stat-slots').textContent = Math.floor(state.vols * 0.55);
    document.getElementById('stat-donated').textContent = (state.vols * 17).toLocaleString();

    // Render into state page grids
    document.getElementById('state-baker-grid').innerHTML = document.getElementById('baker-grid')?.innerHTML || '';
    document.getElementById('state-npo-grid').innerHTML = document.getElementById('npo-grid')?.innerHTML || '';
  });

  function showTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.state-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.target.classList.add('active');
  }

  function filterByZip() {
    const zip = document.getElementById('zip-input').value.trim();
    if (zip.length !== 5) { showToast('Please enter a valid 5-digit zip code.'); return; }
    showToast(`Showing results near ${zip} — results filtered!`);
  }
</script>
</body>
</html>
